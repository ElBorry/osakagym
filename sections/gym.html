<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYM - Osaka Gym</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const source = urlParams.get('source'); // gallery o null
    </script>

    <!-- Navbar: visible solo si no es gallery -->
    <script>
        if (source !== 'gallery') {
            document.write(`
                <header>
                    <nav id="mainNav" class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
                        <div class="container">
                            <a href="../index.html" class="navbar-brand">
                                <img src="../images/logo.PNG" alt="Osaka Gym" class="navbar-logo">
                                Osaka Gym
                            </a>
                            <div class="collapse navbar-collapse" id="navbarNav">
                                <ul class="navbar-nav ms-auto">
                                    <li class="nav-item"><a href="gym.html" class="nav-link">GYM</a></li>
                                    <li class="nav-item"><a href="rutinas.html" class="nav-link">Rutinas</a></li>
                                    <li class="nav-item"><a href="avisos.html" class="nav-link">Avisos</a></li>
                                    <li class="nav-item"><a href="disfrutando.html" class="nav-link">Disfrutando</a></li>
                                </ul>
                            </div>
                        </div>
                    </nav>
                </header>
            `);
        }
    </script>

    <main>
        <!-- Botón "Volver a galería", visible solo si es gallery -->
        <script>
            if (source === 'gallery') {
                document.write(`
                    <div class="container my-3">
                        <a href="gallery.html" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Volver a la galería
                        </a>
                    </div>
                `);
            }
        </script>

        <section class="page-section">
            <div class="container">
                <h1 class="text-center mb-4">Galería de GYM</h1>
                <!-- Carrusel -->
                <div id="gymCarousel" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="../images/GIM1.jpg" class="d-block w-100" alt="Gym 1">
                        </div>
                        <div class="carousel-item">
                            <img src="../images/GIM2.jpg" class="d-block w-100" alt="Gym 2">
                        </div>
                        <div class="carousel-item">
                            <img src="../images/GIM3.jpg" class="d-block w-100" alt="Gym 3">
                        </div>
                    </div>
                    <button class="carousel-control-prev" type="button" data-bs-target="#gymCarousel" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Previous</span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#gymCarousel" data-bs-slide="next">
                        <span class="carousel-control-next-icon" aria-hidden="true"></span>
                        <span class="visually-hidden">Next</span>
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <script>
        if (source !== 'gallery') {
            document.write(`
                <footer class="footer">
                    <div class="container">
                        <p>© 2024 Osaka Gym - Todos los derechos reservados</p>
                    </div>
                </footer>
            `);
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script src="../js/scripts.js"></script>
</body>

</html>
